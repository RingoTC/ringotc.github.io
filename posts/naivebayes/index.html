  <h1 class="subtitle is-size-4-mobile is-size-3-desktop">朴素贝叶斯方法中的极大似然和极大后验估计</h1>
  <div class="content">
    <p>朴素贝叶斯方法是机器学习中十分经典的一种方法，它通过对联合概率分布$P(X,Y)$进行学习，进而得到后验概率$P(Y=y_k,X=x_k)$。</p>
<p>朴素贝叶斯算法的核心是进行参数估计，一般的，我们有两种方式去估计参数，分别是极大似然和极大后验估计。本篇博文以二分类问题为例，介绍这两种估计方法。</p>
